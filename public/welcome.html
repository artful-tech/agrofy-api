<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrofy API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f1f0f;
      color: #e8f5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background-color: #2e7d32;
      color: #c8e6c9;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #a5d6a7;
      margin-bottom: 0.5rem;
    }

    h1 span { color: #66bb6a; }

    p {
      font-size: 1.1rem;
      color: #81c784;
      margin-bottom: 2rem;
    }

    .endpoints {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .endpoint {
      background-color: #1b2e1b;
      border: 1px solid #2e7d32;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: #a5d6a7;
      font-family: monospace;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #388e3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">v1.0.0</div>
    <h1>Agrofy <span>API</span></h1>
    <p>Bem-vindo à API da plataforma Agrofy.</p>
    <div class="endpoints">
      <div class="endpoint">GET /api/users</div>
      <div class="endpoint">POST /api/users</div>
      <div class="endpoint">GET /api/users/:id</div>
      <div class="endpoint">PUT /api/users/:id</div>
      <div class="endpoint">DELETE /api/users/:id</div>
    </div>
    <div class="footer">Agrofy API &copy; 2025</div>
  </div>
</body>
</html>
